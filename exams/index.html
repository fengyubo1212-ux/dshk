// ===== 考试引擎 =====
var examTimer = null;
var examSeconds = 2700; // 45分钟
var examQuestions = [];
var examAnswers = [];
var examCurrentIndex = 0;
var examSubject = '';
var examActive = false;

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function startExam(subject) {
  if (examActive) return;
  examActive = true;
  examSubject = subject;
  examSeconds = 2700;
  examCurrentIndex = 0;
  examAnswers = [];

  var pool = subject === 'geography' ? GEO_QUESTIONS : BIO_QUESTIONS;
  examQuestions = shuffle(pool).slice(0, 20);

  document.getElementById('exam-home').classList.add('hidden');
  document.getElementById('exam-area').classList.remove('hidden');
  document.getElementById('exam-results').classList.add('hidden');
  document.getElementById('exam-title').textContent = (subject === 'geography' ? '🌍 地理模拟考' : '🧬 生物模拟考') + ' · 20题';

  updateTimer();
  examTimer = setInterval(function() {
    examSeconds--;
    updateTimer();
    if (examSeconds <= 0) {
      clearInterval(examTimer);
      finishExam();
    }
  }, 1000);

  renderExamQuestion();
}

function updateTimer() {
  var m = Math.floor(examSeconds / 60);
  var s = examSeconds % 60;
  var el = document.getElementById('exam-timer');
  el.textContent = m + ':' + (s < 10 ? '0' : '') + s;
  if (examSeconds < 300) el.classList.add('warning');
  else el.classList.remove('warning');
}

function renderExamQuestion() {
  if (examCurrentIndex >= examQuestions.length) {
    clearInterval(examTimer);
    finishExam();
    return;
  }

  var q = examQuestions[examCurrentIndex];
  var total = examQuestions.length;
  var idx = examCurrentIndex;
  var labels = ['A', 'B', 'C', 'D'];

  var html = '';
  html += '<div class="quiz-progress">';
  html += '<span>第 ' + (idx + 1) + ' / ' + total + ' 题</span>';
  html += '<div class="progress-bar"><div class="fill" style="width:' + Math.round((idx / total) * 100) + '%"></div></div>';
  html += '<span>' + (q.chapterName || '') + '</span>';
  html += '</div>';

  html += '<div class="quiz-question">';
  html += '<div class="q-num">第 ' + (idx + 1) + ' 题</div>';
  html += '<div class="q-text">' + q.question + '</div>';
  html += '<div class="quiz-options">';
  q.options.forEach(function(opt, optIdx) {
    html += '<div class="quiz-option" data-index="' + optIdx + '" onclick="selectExamAnswer(' + optIdx + ')">';
    html += '<span class="opt-label">' + (labels[optIdx] || optIdx) + '</span>';
    html += '<span>' + opt + '</span>';
    html += '</div>';
  });
  html += '</div>';
  html += '<div class="quiz-feedback" id="exam-feedback"></div>';
  html += '</div>';

  html += '<div style="display:flex;justify-content:space-between;margin-top:12px;flex-wrap:wrap;gap:8px;">';
  html += '<button class="btn btn-outline btn-sm" onclick="prevExamQuestion()"' + (idx === 0 ? ' style="visibility:hidden"' : '') + '>上一题</button>';
  html += '<button class="btn btn-danger btn-sm" onclick="submitExam()">交卷</button>';
  html += '<button class="btn btn-primary btn-sm" onclick="nextExamQuestion()">' + (idx === total - 1 ? '完成' : '下一题') + '</button>';
  html += '</div>';

  document.getElementById('exam-content').innerHTML = html;
  document.getElementById('exam-content').scrollIntoView({ behavior: 'smooth' });
}

function selectExamAnswer(optIdx) {
  if (examAnswers[examCurrentIndex] !== undefined) return;

  var q = examQuestions[examCurrentIndex];
  var isCorrect = (optIdx === q.answer);

  examAnswers[examCurrentIndex] = { userAnswer: optIdx, correct: isCorrect };

  var options = document.querySelectorAll('#exam-content .quiz-option');
  options.forEach(function(opt) { opt.style.pointerEvents = 'none'; });

  var selectedOpt = document.querySelector('#exam-content .quiz-option[data-index="' + optIdx + '"]');
  var correctOpt = document.querySelector('#exam-content .quiz-option[data-index="' + q.answer + '"]');

  if (isCorrect) {
    selectedOpt.classList.add('correct');
  } else {
    selectedOpt.classList.add('wrong');
    correctOpt.classList.add('show-correct');
  }

  var fb = document.getElementById('exam-feedback');
  fb.className = 'quiz-feedback show ' + (isCorrect ? 'correct' : 'wrong');
  fb.innerHTML = isCorrect ? '✓ 正确！' : '✗ 错误。正确答案是 ' + (['A','B','C','D'][q.answer]);

  if (!isCorrect) {
    addError({
      id: q.id, subject: examSubject, chapterId: '', chapterName: q.chapterName || '',
      question: q.question, options: q.options, correctAnswer: q.answer,
      userAnswer: optIdx, explanation: q.explanation || '', date: new Date().toISOString().slice(0, 10)
    });
  }
}

function nextExamQuestion() {
  if (examCurrentIndex < examQuestions.length - 1) {
    examCurrentIndex++;
    renderExamQuestion();
  } else {
    submitExam();
  }
}

function prevExamQuestion() {
  if (examCurrentIndex > 0) {
    examCurrentIndex--;
    renderExamQuestion();
  }
}

function submitExam() {
  if (confirm('确定交卷吗？未作答的题目将计为错误。')) {
    clearInterval(examTimer);
    finishExam();
  }
}

function finishExam() {
  examActive = false;
  var correctCount = examAnswers.filter(function(a) { return a.correct; }).length;
  var answeredCount = examAnswers.length;
  var total = examQuestions.length;
  var pct = Math.round((correctCount / total) * 100);
  var emoji = pct >= 90 ? '🎉' : pct >= 70 ? '👍' : pct >= 50 ? '📚' : '💪';
  var grade = pct >= 90 ? '优秀' : pct >= 75 ? '良好' : pct >= 60 ? '及格' : '加油';

  var m = Math.floor((2700 - examSeconds) / 60);
  var s = (2700 - examSeconds) % 60;

  var html = '<div class="quiz-results">';
  html += '<div style="font-size:3rem;">' + emoji + '</div>';
  html += '<div class="score">' + correctCount + ' / ' + total + '</div>';
  html += '<div class="score-label">正确率 ' + pct + '% · ' + grade + '</div>';
  html += '<p style="color:var(--color-text-light);">用时 ' + m + '分' + s + '秒 · 已答' + answeredCount + '题</p>';

  if (correctCount < total) {
    html += '<p style="color:var(--color-text-light);margin-bottom:16px;">错题已自动加入错题本，可去错题本复习。</p>';
  }

  html += '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">';
  html += '<button class="btn btn-outline" onclick="retryWrong()">重做错题</button>';
  html += '<button class="btn btn-primary" onclick="restartExam()">重新考试</button>';
  html += '<button class="btn btn-outline" onclick="goHome()">返回首页</button>';
  html += '</div>';
  html += '</div>';

  document.getElementById('exam-content').innerHTML = '';
  document.getElementById('exam-results').innerHTML = html;
  document.getElementById('exam-results').classList.remove('hidden');
  document.getElementById('exam-timer').textContent = '0:00';
}

function retryWrong() {
  var wrongIndices = [];
  examAnswers.forEach(function(a, i) { if (!a.correct) wrongIndices.push(i); });
  if (wrongIndices.length === 0) { alert('没有错题，全部正确！'); return; }
  examQuestions = wrongIndices.map(function(i) { return examQuestions[i]; });
  examCurrentIndex = 0;
  examAnswers = [];
  examActive = true;
  document.getElementById('exam-results').classList.add('hidden');
  document.getElementById('exam-title').textContent += ' (错题重做)';
  renderExamQuestion();
}

function restartExam() {
  location.reload();
}

function goHome() {
  location.href = '../index.html';
}
</script>

</body>
</html>
